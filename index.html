<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ashwin vs PDogg: Flappy Chase</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Arial Black', Arial, sans-serif;
            touch-action: none;
            height: 100%;
            width: 100%;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #87CEEB;
            overflow: hidden;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #B0E0E6 100%);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .overlay h1 { font-size: clamp(24px, 7vw, 48px); margin: 0 0 10px; letter-spacing: 2px; }
        .overlay h2 { font-size: clamp(20px, 6vw, 40px); margin: 0 0 10px; }
        .overlay p  { font-size: clamp(14px, 4vw, 20px); margin: 5px 0 15px; }

        .hidden { display: none !important; }

        .btn {
            display: block;
            padding: 18px 40px;
            margin: 12px auto;
            font-size: clamp(16px, 5vw, 22px);
            cursor: pointer;
            background: #ffcc00;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px #ccaa00;
            color: #333;
            min-width: 200px;
            -webkit-appearance: none;
            user-select: none;
            touch-action: manipulation;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px #ccaa00; }

        #ui {
            position: absolute;
            top: 20px; width: 100%;
            text-align: center;
            color: white;
            font-size: clamp(32px, 10vw, 50px);
            text-shadow: 3px 3px 0px #000;
            pointer-events: none;
            z-index: 5;
        }

        .commentary {
            font-style: italic;
            color: #ffcc00;
            margin: 15px 0;
            font-size: clamp(14px, 4.5vw, 22px);
            max-width: 90%;
        }

        #tap-hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: clamp(13px, 3.5vw, 18px);
            pointer-events: none;
            z-index: 5;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>

<div id="game-container">

    <audio id="bgMusic" loop preload="auto">
        <source src="jaunty.mp3" type="audio/mpeg">
    </audio>
    <audio id="outSound" preload="auto">
        <source src="out.m4a" type="audio/mp4">
    </audio>

    <div id="start-screen" class="overlay">
        <h1>🏏 CRICKET FLAPPY</h1>
        <p>Tap or press Space to flap</p>
        <button class="btn" id="btn-ashwin">Play as Ashwin</button>
        <button class="btn" id="btn-pdogg">Play as PDogg</button>
    </div>

    <div id="ui" class="hidden">0</div>
    <div id="tap-hint" class="hidden">TAP TO FLAP!</div>

    <div id="game-over" class="overlay hidden">
        <h2 id="result-title">OUT!</h2>
        <div id="commentary-text" class="commentary"></div>
        <p>Final Score: <span id="final-score">0</span></p>
        <button class="btn" id="btn-menu">Main Menu</button>
        <button class="btn" id="btn-retry" style="background:#44cc88;box-shadow:0 5px #2a9960;">Play Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');
    const ui      = document.getElementById('ui');
    const hint    = document.getElementById('tap-hint');
    const music   = document.getElementById('bgMusic');
    const outSnd  = document.getElementById('outSound');
    const gc      = document.getElementById('game-container');

    let gameActive = false;
    let mode = '';
    let score = 0;
    let frame = 0;
    let pipes = [];
    let animId = null;
    let audioUnlocked = false;
    let smoothTilt = 0;

    const player = {
        x: 0, y: 0,
        w: 60, h: 70,
        gravity: 0.28,
        velocity: 0,
        jump: -7,
        img: new Image(),
        loaded: false
    };

    function resize() {
        canvas.width  = gc.offsetWidth;
        canvas.height = gc.offsetHeight;
        if (!gameActive) player.y = canvas.height / 2;
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));
    resize();

    function unlockAudio() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        [music, outSnd].forEach(a => {
            a.play().then(() => a.pause()).catch(() => {});
        });
    }

    function initGame(selectedMode) {
        unlockAudio();
        mode = selectedMode;

        const src = mode === 'ashwin' ? 'pdogg2.jpeg' : 'pdogg1.jpeg';
        if (player.img.src !== location.href + src) {
            player.img.src = src;
            player.loaded  = false;
            player.img.onload = () => { player.loaded = true; };
        } else {
            player.loaded = true;
        }

        player.x        = canvas.width * 0.15;
        player.y        = canvas.height / 2;
        player.velocity = 0;
        score = 0; pipes = []; frame = 0; smoothTilt = 0;

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        ui.classList.remove('hidden');
        hint.classList.remove('hidden');
        ui.innerText = '0';

        music.currentTime   = 0;
        music.playbackRate  = mode === 'pdogg' ? 1.15 : 1.0;
        music.volume        = 0.6;
        music.play().catch(() => {});

        gameActive = true;
        if (animId) cancelAnimationFrame(animId);
        animId = requestAnimationFrame(update);
    }

    function flap() {
        if (!gameActive) return;
        unlockAudio();
        player.velocity = player.jump;
        hint.classList.add('hidden');
    }

    document.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
    });

    gc.addEventListener('touchstart', e => {
        e.preventDefault();
        if (!gameActive) return;
        flap();
    }, { passive: false });

    document.getElementById('btn-ashwin').addEventListener('click', () => initGame('ashwin'));
    document.getElementById('btn-pdogg').addEventListener('click',  () => initGame('pdogg'));
    document.getElementById('btn-menu').addEventListener('click',   resetToMenu);
    document.getElementById('btn-retry').addEventListener('click',  () => initGame(mode));

    function createPipe() {
        const gap       = Math.min(200, canvas.height * 0.28);
        const minH      = 60;
        const maxTop    = canvas.height - gap - minH;
        const topHeight = Math.random() * (maxTop - minH) + minH;
        pipes.push({ x: canvas.width + 10, top: topHeight, bottom: canvas.height - topHeight - gap, width: 65, passed: false });
    }

    function gameOver() {
        gameActive = false;
        music.pause();

        outSnd.currentTime = 0;
        outSnd.play().catch(() => {});

        document.getElementById('final-score').innerText = score;
        document.getElementById('commentary-text').innerText =
            mode === 'ashwin' ? 'Ashwin: "Give it another try!"' : 'PDogg: "Come on, mate!"';

        hint.classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');
    }

    function resetToMenu() {
        gameActive = false;
        music.pause();
        music.currentTime = 0;
        if (animId) { cancelAnimationFrame(animId); animId = null; }
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        hint.classList.add('hidden');
        ui.classList.add('hidden');
    }

    function drawPipe(p) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(p.x, 0, p.width, p.top);
        ctx.fillRect(p.x, canvas.height - p.bottom, p.width, p.bottom);

        ctx.fillStyle = '#cc2200';
        ctx.fillRect(p.x - 6, p.top - 22, p.width + 12, 22);
        ctx.fillRect(p.x - 6, canvas.height - p.bottom, p.width + 12, 22);

        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(p.x + 6, 0, 8, p.top - 22);
        ctx.fillRect(p.x + 6, canvas.height - p.bottom + 22, 8, p.bottom - 22);
    }

    function drawPlayer() {
        if (player.loaded) {
            ctx.save();
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            const targetTilt = Math.max(-25, Math.min(25, player.velocity * 3));
            smoothTilt += (targetTilt - smoothTilt) * 0.08;
            ctx.rotate(smoothTilt * Math.PI / 180);
            ctx.drawImage(player.img, -player.w / 2, -player.h / 2, player.w, player.h);
            ctx.restore();
        } else {
            ctx.fillStyle = mode === 'ashwin' ? '#e63946' : '#457b9d';
            ctx.beginPath();
            ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(mode === 'ashwin' ? 'ASH' : 'PDG', player.x + player.w/2, player.y + player.h/2 + 5);
        }
    }

    const PIPE_INTERVAL = 95;
    const PIPE_SPEED    = 3.2;

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        player.velocity += player.gravity;
        player.y        += player.velocity;

        if (frame % PIPE_INTERVAL === 0) createPipe();

        for (let i = pipes.length - 1; i >= 0; i--) {
            const p = pipes[i];
            p.x -= PIPE_SPEED;
            drawPipe(p);

            const px1 = player.x + 8,   px2 = player.x + player.w - 8;
            const py1 = player.y + 8,   py2 = player.y + player.h - 8;
            const inXRange = px2 > p.x && px1 < p.x + p.width;

            if (inXRange && (py1 < p.top || py2 > canvas.height - p.bottom)) {
                gameOver(); return;
            }
            if (player.y + player.h > canvas.height || player.y < 0) {
                gameOver(); return;
            }

            if (!p.passed && p.x + p.width < player.x) {
                p.passed = true;
                score++;
                ui.innerText = score;
            }
            if (p.x + p.width < 0) pipes.splice(i, 1);
        }

        drawPlayer();
        frame++;
        animId = requestAnimationFrame(update);
    }
</script>
</body>
</html>
