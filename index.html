<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashwin vs PDogg: Flappy Chase</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Arial Black', sans-serif;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #87CEEB;
            overflow: hidden;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #B0E0E6 100%);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        button {
            padding: 20px 40px;
            margin: 15px;
            font-size: 20px;
            cursor: pointer;
            background: #ffcc00;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px #ccaa00;
        }

        button:active { transform: translateY(4px); box-shadow: 0 2px #ccaa00; }

        #ui {
            position: absolute;
            top: 20px; width: 100%;
            text-align: center;
            color: white;
            font-size: 40px;
            text-shadow: 3px 3px 0px #000;
            pointer-events: none;
            z-index: 5;
        }

        .commentary {
            font-style: italic;
            color: #ffcc00;
            margin: 20px 0;
            font-size: 24px;
        }

#top-credit {
    position: absolute;
    top: 5px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: white;
    z-index: 20;
    text-shadow: 1px 1px 2px black;
}

#bottom-credit {
    position: absolute;
    bottom: 5px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: white;
    z-index: 20;
    text-shadow: 1px 1px 2px black;
}
    </style>
</head>
<body>

<div id="game-container">
   
   <div id="top-credit">Created by Navaneet</div>
   <div id="bottom-credit">© Cric Connect</div>

    <!-- 🎵 Background Music -->
    <audio id="bgMusic" loop>
        <source src="jaunty.mp3" type="audio/mpeg">
    </audio>

    <!-- 🔊 OUT Sound -->
    <audio id="outSound">
        <source src="out.m4a" type="audio/mp4">
    </audio>

    <div id="start-screen" class="overlay">
        <h1>CRICKET FLAPPY</h1>
        <p>Tap or Space to Jump</p>
        <button onclick="initGame('ashwin')">Play Ashwin</button>
        <button onclick="initGame('pdogg')">Play PDogg</button>
    </div>

    <div id="ui" class="hidden">0</div>

    <div id="game-over" class="overlay hidden">
        <h2 id="result-title">OUT!</h2>
        <div id="commentary-text" class="commentary"></div>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="resetToMenu()">Main Menu</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const music = document.getElementById('bgMusic');
    const outSound = document.getElementById('outSound');

    let gameActive = false;
    let mode = '';
    let score = 0;
    let frame = 0;
    let pipes = [];
    
    const player = {
        x: 50,
        y: 200,
        w: 60,
        h: 70,
        gravity: 0.25,
        velocity: 0,
        jump: -6,
        img: new Image()
    };

    const imgAshwin = 'pdogg2.jpeg';
    const imgPDogg = 'pdogg1.jpeg';

    function resize() {
        canvas.width = document.getElementById('game-container').offsetWidth;
        canvas.height = document.getElementById('game-container').offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function initGame(selectedMode) {
        mode = selectedMode;

        // 🎵 Start Music
        music.currentTime = 0;
        music.play();
        music.playbackRate = mode === 'pdogg' ? 1.1 : 1.0;

        player.img.src = mode === 'ashwin' ? imgAshwin : imgPDogg;
        player.y = canvas.height / 2;
        player.velocity = 0;
        score = 0;
        pipes = [];
        frame = 0;
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        ui.classList.remove('hidden');
        ui.innerText = "0";
        gameActive = true;
        
        requestAnimationFrame(update);

        outSound.play().then(() => {
        outSound.pause();
        outSound.currentTime = 0;
});
    }

    function flap() {
        if (gameActive) player.velocity = player.jump;
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') flap(); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, {passive: false});

    function createPipe() {
        const gap = 180;
        const minPipeHeight = 50;
        const topHeight = Math.random() * (canvas.height - gap - (minPipeHeight * 2)) + minPipeHeight;
        
        pipes.push({
            x: canvas.width,
            top: topHeight,
            bottom: canvas.height - topHeight - gap,
            width: 60,
            passed: false
        });
    }

    function gameOver() {
        gameActive = false;

        // 🎵 Stop music
        music.pause();

        // 🔊 Play OUT sound
        outSound.currentTime = 0;
        outSound.play();

        const screen = document.getElementById('game-over');
        const comm = document.getElementById('commentary-text');
        
        screen.classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        if (mode === 'ashwin') {
            comm.innerText = "Ashwin: \"Give another Try!\"";
        } else {
            comm.innerText = "PDogg: \"Come on!\"";
        }
         outSound.currentTime = 0;
         outSound.play().catch(err => console.log(err));
    }

    function resetToMenu() {
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        ui.classList.add('hidden');

        music.pause();
        music.currentTime = 0;
    }

    function drawPipe(pipe) {
        ctx.fillStyle = "#8B4513";
        
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
        
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(pipe.x - 5, pipe.top - 20, pipe.width + 10, 20);
        ctx.fillRect(pipe.x - 5, canvas.height - pipe.bottom, pipe.width + 10, 20);

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(pipe.x + pipe.width/2, pipe.top + 90, 10, 0, Math.PI*2);
        ctx.fill();
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        player.velocity += player.gravity;
        player.y += player.velocity;

        ctx.drawImage(player.img, player.x, player.y, player.w, player.h);

        if (frame % 100 === 0) createPipe();

        for (let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= 3;

            drawPipe(p);

            const hitTop = player.x + 10 < p.x + p.width && player.x + player.w - 10 > p.x && player.y + 10 < p.top;
            const hitBottom = player.x + 10 < p.x + p.width && player.x + player.w - 10 > p.x && player.y + player.h - 10 > canvas.height - p.bottom;

            if (hitTop || hitBottom || player.y + player.h > canvas.height || player.y < 0) {
                gameOver();
            }

            if (!p.passed && p.x + p.width < player.x) {
                p.passed = true;
                score++;
                ui.innerText = score;
            }

            if (p.x + p.width < 0) pipes.splice(i, 1);
        }

        frame++;
        requestAnimationFrame(update);
    }
</script>

</body>
</html>
